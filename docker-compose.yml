# Full stack (Step 6). For the Step 2 slice bring up only infra:
#   docker compose up -d rabbitmq mongo
# For scaling:
#   docker compose up --build --scale worker=3
services:
  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - '5672:5672' # AMQP
      - '15672:15672' # management UI
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.runCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis web GUI (like RabbitMQ's management UI, but for Redis).
  # Open http://localhost:5540 → "Add database" is pre-filled via env below.
  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - '5540:5540'
    environment:
      # Auto-register the local Redis so you don't have to add it by hand.
      RI_REDIS_HOST: redis
      RI_REDIS_PORT: '6379'
      RI_REDIS_ALIAS: viper-redis
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: viper
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: '1'
      REAPER_ENABLED: '1'
      WORKER_PREFETCH: '${WORKER_PREFETCH:-20}'  # Default 20 for high concurrency
      MODEL_MIN_DELAY_MS: '${MODEL_MIN_DELAY_MS:-300}'
      MODEL_MAX_DELAY_MS: '${MODEL_MAX_DELAY_MS:-1200}'
      MODEL_AVG_TURNS: '${MODEL_AVG_TURNS:-3}'
      TOOL_MIN_DELAY_MS: '${TOOL_MIN_DELAY_MS:-200}'
      TOOL_MAX_DELAY_MS: '${TOOL_MAX_DELAY_MS:-800}'
      # Sandbox disabled by default in-compose (needs docker-in-docker). Enable
      # with SANDBOX_ENABLED=1 and mounting the docker socket if desired.
      SANDBOX_ENABLED: '0'
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No ports: workers are headless. Scale with --scale worker=N.

  # Backend API tier. Thin & stateless: publishes jobs, exposes SSE + metrics.
  # NOTE on the failure simulator: /api/chaos and /api/ops shell out to the
  # Docker CLI to kill/scale/count containers. That's far simpler and safer to
  # run ON THE HOST (`CHAOS_ENABLED=1 npm run api`) than to mount the Docker
  # socket into a container. This compose `backend` service is the plain relay
  # (simulator off); for the full interactive experience run the backend on the
  # host. See README "Run the interactive app".
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    ports:
      - '3000:3000'
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: viper
      REDIS_URL: redis://redis:6379
      REDIS_ENABLED: '1'
      WEB_PORT: '3000'
      CHAOS_ENABLED: '0'
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Next.js chat frontend — the only user-facing UI. Proxies /runs + /api to the
  # backend. Point it at the host-run backend so the failure simulator works.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      # host.docker.internal → the host, where the simulator-enabled backend runs.
      BACKEND_URL: http://host.docker.internal:3000
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  mongo-data:
