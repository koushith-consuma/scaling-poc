<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Viper POC — Live Tester</title>
<style>
  :root{--bg:#0f1420;--panel:#171e2e;--panel2:#1e2740;--line:#2a3450;--fg:#e6ebf5;--muted:#8493b3;
    --accent:#4aa8ff;--ok:#37d67a;--warn:#ffb020;--bad:#ff5c5c;--pending:#8493b3;--running:#4aa8ff;}
  *{box-sizing:border-box}
  body{margin:0;font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,Helvetica,Arial;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden}
  .app{display:grid;grid-template-columns:1fr 380px;grid-template-rows:auto 1fr;height:100vh}
  header{grid-column:1/-1;display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:16px;margin:0;font-weight:700;letter-spacing:.3px}
  header .tag{font-size:11px;color:var(--muted);background:var(--panel2);padding:3px 8px;border-radius:20px}
  .pipeline{display:flex;align-items:center;gap:6px;margin-left:auto}
  .stage{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:64px}
  .stage .dot{width:11px;height:11px;border-radius:50%;background:var(--line);transition:.2s}
  .stage.live .dot{background:var(--accent);box-shadow:0 0 10px var(--accent)}
  .stage.dead .dot{background:var(--bad)}
  .stage .lbl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .arrow{color:var(--line);font-size:12px}
  main{overflow-y:auto;padding:18px 20px}
  aside{background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:16px}
  .composer{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .composer input,.composer select{background:var(--panel2);border:1px solid var(--line);color:var(--fg);padding:9px 11px;border-radius:8px;font-size:13px}
  .composer input#msg{flex:1;min-width:220px}
  .composer input#thread{width:150px}
  button{background:var(--accent);color:#04101f;border:0;padding:9px 15px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
  button.ghost{background:var(--panel2);color:var(--fg);border:1px solid var(--line);font-weight:600}
  button.bad{background:var(--bad);color:#2a0808}
  button.warn{background:var(--warn);color:#2a1c00}
  button:disabled{opacity:.5;cursor:not-allowed}
  .run{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:14px;overflow:hidden}
  .run .head{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel2);cursor:pointer}
  .run .head .id{font-family:ui-monospace,monospace;font-size:12px;color:var(--muted)}
  .badge{font-size:10.5px;padding:2px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
  .badge.pending{background:#2a3450;color:var(--pending)}
  .badge.running{background:#123353;color:var(--running)}
  .badge.done{background:#0f3a24;color:var(--ok)}
  .badge.failed{background:#3a1414;color:var(--bad)}
  .run .meta{margin-left:auto;font-size:11px;color:var(--muted)}
  .events{max-height:280px;overflow-y:auto;padding:6px 0}
  .ev{display:flex;gap:10px;padding:5px 14px;font-size:12.5px;border-top:1px solid #202942;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateX(-6px)}to{opacity:1}}
  .ev .seq{color:var(--muted);font-family:ui-monospace,monospace;min-width:26px}
  .ev .ty{min-width:96px;font-weight:600}
  .ev.run_started .ty{color:var(--accent)} .ev.tool_call .ty{color:var(--warn)}
  .ev.tool_result .ty{color:#9aa} .ev.run_done .ty{color:var(--ok)} .ev.run_failed .ty{color:var(--bad)}
  .ev .pl{color:var(--muted);font-family:ui-monospace,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:4px 0 10px}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .tile{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px}
  .tile .n{font-size:24px;font-weight:800}
  .tile .k{font-size:11px;color:var(--muted);margin-top:2px}
  .tile.accent .n{color:var(--accent)} .tile.ok .n{color:var(--ok)} .tile.warn .n{color:var(--warn)} .tile.bad .n{color:var(--bad)}
  .health{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .svc{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);padding:6px 10px;border-radius:20px;font-size:12px}
  .svc .d{width:9px;height:9px;border-radius:50%;background:var(--muted)}
  .svc.up .d{background:var(--ok)} .svc.down .d{background:var(--bad);box-shadow:0 0 8px var(--bad)}
  .chaos{display:grid;gap:8px}
  .chaos .row{display:flex;gap:8px}
  .chaos .row button{flex:1;font-size:12px;padding:8px}
  .log{background:#0a0e17;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-family:ui-monospace,monospace;font-size:11px;color:var(--muted);max-height:140px;overflow-y:auto;margin-top:10px}
  .log div{padding:1px 0}
  .scaler{display:flex;gap:6px;align-items:center}
  .scaler input{width:52px;background:var(--panel2);border:1px solid var(--line);color:var(--fg);padding:6px;border-radius:6px}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>⚡ Viper POC</h1>
    <span class="tag" id="conn">connecting…</span>
    <div class="pipeline" id="pipeline">
      <div class="stage" data-s="browser"><div class="dot"></div><div class="lbl">Browser</div></div><span class="arrow">▶</span>
      <div class="stage" data-s="web"><div class="dot"></div><div class="lbl">Web</div></div><span class="arrow">▶</span>
      <div class="stage" data-s="rabbit"><div class="dot"></div><div class="lbl">RabbitMQ</div></div><span class="arrow">▶</span>
      <div class="stage" data-s="worker"><div class="dot"></div><div class="lbl">Worker</div></div><span class="arrow">▶</span>
      <div class="stage" data-s="mongo"><div class="dot"></div><div class="lbl">Mongo</div></div><span class="arrow">▶</span>
      <div class="stage" data-s="redis"><div class="dot"></div><div class="lbl">Redis</div></div><span class="arrow">▶</span>
      <div class="stage" data-s="sse"><div class="dot"></div><div class="lbl">SSE</div></div>
    </div>
  </header>

  <main>
    <div class="composer">
      <input id="msg" placeholder="Type a message to send through the pipeline…" value="hello agent" />
      <input id="thread" placeholder="threadId (optional)" />
      <button id="send">Send ▶</button>
      <button class="ghost" id="burst">Same-thread ×3</button>
      <button class="ghost" id="flood">Flood ×25</button>
    </div>
    <div id="runs"></div>
  </main>

  <aside>
    <h2>Service health</h2>
    <div class="health" id="health"></div>

    <h2>Live stats</h2>
    <div class="tiles">
      <div class="tile accent"><div class="n" id="t-workers">–</div><div class="k">workers (consumers)</div></div>
      <div class="tile warn"><div class="n" id="t-queue">–</div><div class="k">queue depth</div></div>
      <div class="tile"><div class="n" id="t-running">–</div><div class="k">running</div></div>
      <div class="tile ok"><div class="n" id="t-done">–</div><div class="k">done</div></div>
      <div class="tile"><div class="n" id="t-pending">–</div><div class="k">pending</div></div>
      <div class="tile bad"><div class="n" id="t-failed">–</div><div class="k">failed</div></div>
    </div>

    <h2>Chaos — break it on purpose</h2>
    <div class="chaos">
      <div class="row">
        <button class="warn" data-chaos="kill-worker">💥 Kill a worker</button>
      </div>
      <div class="row">
        <button class="bad" data-chaos="stop-redis">Stop Redis</button>
        <button class="ghost" data-chaos="start-redis">Start Redis</button>
      </div>
      <div class="row">
        <button class="bad" data-chaos="stop-mongo">Stop Mongo</button>
        <button class="ghost" data-chaos="start-mongo">Start Mongo</button>
      </div>
      <div class="row">
        <button class="bad" data-chaos="stop-rabbit">Stop RabbitMQ</button>
        <button class="ghost" data-chaos="start-rabbit">Start RabbitMQ</button>
      </div>
      <div class="row scaler">
        <span style="font-size:12px;color:var(--muted)">Scale workers</span>
        <input id="scaleN" type="number" min="0" max="20" value="3" />
        <button class="ghost" data-chaos="scale-workers">Apply</button>
      </div>
    </div>
    <div class="log" id="log"></div>
  </aside>
</div>
<script src="app.js"></script>
</body>
</html>
